# Robustness analysis configuration
# ====================================

# Dataset
dataset:
  root: "./data/EuroSAT_RGB"
  image_size_ml: [64, 64]       # For ML models
  image_size_dl: [224, 224]     # For DL model

# Data splitting — informational only, not read by run_robustness.py.
# Split metadata is loaded from disk (saved by run_ml.py / run_dl.py).
split:
  train_ratio: 0.7        # not read
  val_ratio: 0.15         # not read
  test_ratio: 0.15        # not read
  random_seed: 42         # not read

# Feature mode for ML models (must exactly match the suffix of trained model filenames)
# Trained models are named: SVM_hog, RandomForest_hog_color, XGBoost_hog_color_texture, etc.
feature_mode: "hog_color_texture"

# Degradation settings
degradations:
  gaussian_blur:
    - sigma: 1.0
      label: "blur_low"
    - sigma: 3.0
      label: "blur_high"

  gaussian_noise:
    - std: 0.05
      label: "noise_low"
    - std: 0.15
      label: "noise_high"

  downsample:
    - factor: 2
      label: "downsample_2x"
    - factor: 4
      label: "downsample_4x"

# Paths to trained models (auto-detected from results_dir)
results_dir: "./results"
random_seed: 42
