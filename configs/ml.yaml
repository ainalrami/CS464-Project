# Classical ML pipeline configuration
# ====================================

# Dataset
dataset:
  root: "./data/EuroSAT_RGB"
  image_size: [64, 64]          # Resize images before feature extraction

# Data splitting
split:
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  random_seed: 42

# Feature extraction
features:
  # Feature ablation modes: "hog", "hog_color", "hog_color_texture"
  modes:
    - "hog"
    - "hog_color"
    - "hog_color_texture"
  hog:
    orientations: 9
    pixels_per_cell: [8, 8]
    cells_per_block: [2, 2]
  color_histogram:
    bins: 32
  lbp:
    radius: 3
    n_points: 24

# Models to train
models:
  - name: "SVM"
    search:
      C: [0.1, 1.0, 10.0]
      kernel: ["rbf", "linear"]
      gamma: ["scale", "auto"]
    cv_folds: 3
    n_iter: 6

  - name: "RandomForest"
    search:
      n_estimators: [100, 200, 300]
      max_depth: [10, 20, 30, null]
      min_samples_split: [2, 5]
    cv_folds: 3
    n_iter: 8

  - name: "XGBoost"        # Falls back to LogisticRegression if xgboost not installed
    search:
      n_estimators: [100, 200, 300]
      max_depth: [3, 6, 10]
      learning_rate: [0.01, 0.1, 0.3]
    cv_folds: 3
    n_iter: 8

# Output
results_dir: "./results"
random_seed: 42
