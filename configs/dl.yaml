# Deep Learning pipeline configuration
# ======================================

# Dataset
dataset:
  root: "./data/EuroSAT_RGB"
  image_size: [224, 224]        # ResNet18 input size

# Data splitting
split:
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  random_seed: 42

# Model
model:
  architectures: ["resnet18", "cnn"]   # Both are trained in a single run
  pretrained: true
  num_classes: 10
  freeze_backbone: false        # Fine-tune all layers (ResNet18 only)
  # CNN-specific
  cnn_dropout: 0.5

training:
  epochs: 30
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.0001
  optimizer: "adam"

  scheduler:
    type: "reduce_on_plateau"
    factor: 0.5
    patience: 3
    min_lr: 0.00001

  early_stopping:
    patience: 7
    min_delta: 0.001

# Data augmentation
augmentation:
  enabled: true
  horizontal_flip: true
  vertical_flip: false
  rotation_degrees: 15
  color_jitter:
    brightness: 0.2
    contrast: 0.2
    saturation: 0.2
    hue: 0.05

# Compare with and without augmentation
compare_augmentation: false

# Output
results_dir: "./results"
random_seed: 42
